<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>斗地主扑克牌游戏 - 增强版</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <div class="header-left">
                <h1>🃏 斗地主</h1>
                <div class="game-info" id="gameInfo">点击"开始游戏"开始</div>
            </div>
            <div class="header-right">
                <div class="player-stats">
                    <span class="stat-item">💰 <span id="coinDisplay">1000</span></span>
                    <span class="stat-item">🏆 <span id="rankDisplay">青铜III</span></span>
                    <span class="stat-item">⭐ <span id="scoreDisplay">0</span></span>
                </div>
                <div class="header-buttons">
                    <button class="btn-icon" onclick="toggleCardCounter()" title="记牌器">📊</button>
                    <button class="btn-icon" onclick="toggleEmojiPanel()" title="表情">😀</button>
                    <button class="btn-icon" onclick="toggleTasks()" title="任务">📋</button>
                    <button class="btn-icon" onclick="toggleRanking()" title="排行榜">🏆</button>
                </div>
            </div>
        </div>

        <div class="game-mode-selector" id="modeSelector">
            <div class="mode-title">选择游戏模式</div>
            <div class="mode-grid">
                <div class="mode-card active" data-mode="classic" onclick="selectGameMode('classic')">
                    <div class="mode-icon">🎴</div>
                    <div class="mode-name">经典斗地主</div>
                    <div class="mode-desc">标准三人斗地主</div>
                </div>
                <div class="mode-card" data-mode="laizi" onclick="selectGameMode('laizi')">
                    <div class="mode-icon">✨</div>
                    <div class="mode-name">癞子斗地主</div>
                    <div class="mode-desc">随机癞子可当任意牌</div>
                </div>
                <div class="mode-card" data-mode="noshuffle" onclick="selectGameMode('noshuffle')">
                    <div class="mode-icon">🔄</div>
                    <div class="mode-name">不洗牌</div>
                    <div class="mode-desc">炸弹更多更刺激</div>
                </div>
                <div class="mode-card" data-mode="two" onclick="selectGameMode('two')">
                    <div class="mode-icon">👥</div>
                    <div class="mode-name">二人斗地主</div>
                    <div class="mode-desc">一对一快速对战</div>
                </div>
            </div>
        </div>

        <div class="game-table">
            <div class="player-area player-left" id="player1Area">
                <div class="player-info">
                    <span class="player-name" id="player1Name">电脑左</span>
                    <span class="landlord-badge" id="player1Landlord" style="display:none;">👑 地主</span>
                    <span class="card-count" id="player1Count">17张</span>
                </div>
                <div class="ai-cards" id="player1Cards"></div>
                <div class="played-cards" id="player1Played"></div>
                <div class="emoji-bubble" id="player1Emoji"></div>
            </div>

            <div class="center-area">
                <div class="deck-cards" id="deckCards">
                    <div class="deck-title">底牌</div>
                    <div class="deck-container" id="deckContainer"></div>
                    <div class="laizi-display" id="laiziDisplay" style="display:none;">
                        <span>癞子: </span>
                        <span id="laiziCard"></span>
                    </div>
                </div>
                <div class="current-play" id="currentPlay">
                    <div class="play-info" id="playInfo"></div>
                </div>
            </div>

            <div class="player-area player-right" id="player2Area">
                <div class="player-info">
                    <span class="player-name" id="player2Name">电脑右</span>
                    <span class="landlord-badge" id="player2Landlord" style="display:none;">👑 地主</span>
                    <span class="card-count" id="player2Count">17张</span>
                </div>
                <div class="ai-cards" id="player2Cards"></div>
                <div class="played-cards" id="player2Played"></div>
                <div class="emoji-bubble" id="player2Emoji"></div>
            </div>
        </div>

        <div class="player-bottom" id="player0Area">
            <div class="player-info-bottom">
                <span class="player-name">你</span>
                <span class="landlord-badge" id="player0Landlord" style="display:none;">👑 地主</span>
                <span class="card-count" id="player0Count">17张</span>
            </div>
            <div class="played-cards-bottom" id="player0Played"></div>
            <div class="player-cards" id="player0Cards"></div>
            <div class="emoji-bubble" id="player0Emoji"></div>
        </div>

        <div class="control-panel">
            <div class="action-buttons" id="actionButtons">
                <button class="btn btn-primary" id="startBtn" onclick="startGame()">开始游戏</button>
                <button class="btn btn-success" id="callBtn" onclick="callLandlord(true)" style="display:none;">叫地主</button>
                <button class="btn btn-secondary" id="noCallBtn" onclick="callLandlord(false)" style="display:none;">不叫</button>
                <button class="btn btn-success" id="playBtn" onclick="playCards()" style="display:none;">出牌</button>
                <button class="btn btn-warning" id="passBtn" onclick="playerPass()" style="display:none;">不出</button>
                <button class="btn btn-info" id="hintBtn" onclick="showHint()" style="display:none;">提示</button>
            </div>
            <div class="game-message" id="gameMessage"></div>
        </div>

        <div class="side-panel card-counter" id="cardCounter">
            <div class="panel-header">
                <span>📊 记牌器</span>
                <button class="close-btn" onclick="toggleCardCounter()">×</button>
            </div>
            <div class="panel-content">
                <div class="counter-section">
                    <div class="counter-title">剩余牌数</div>
                    <div class="counter-grid" id="remainingCards"></div>
                </div>
                <div class="counter-section">
                    <div class="counter-title">已出牌</div>
                    <div class="counter-grid" id="playedCards"></div>
                </div>
                <div class="counter-section">
                    <div class="counter-title">炸弹统计</div>
                    <div class="bomb-stats" id="bombStats"></div>
                </div>
            </div>
        </div>

        <div class="side-panel emoji-panel" id="emojiPanel">
            <div class="panel-header">
                <span>😀 快捷表情</span>
                <button class="close-btn" onclick="toggleEmojiPanel()">×</button>
            </div>
            <div class="panel-content">
                <div class="emoji-grid">
                    <div class="emoji-item" onclick="sendEmoji('😀')">😀 哈哈哈</div>
                    <div class="emoji-item" onclick="sendEmoji('😭')">😭 太难了</div>
                    <div class="emoji-item" onclick="sendEmoji('😎')">😎 必胜</div>
                    <div class="emoji-item" onclick="sendEmoji('🤔')">🤔 想一下</div>
                    <div class="emoji-item" onclick="sendEmoji('👍')">👍 打得好</div>
                    <div class="emoji-item" onclick="sendEmoji('💣')">💣 炸你</div>
                    <div class="emoji-item" onclick="sendEmoji('🃏')">🃏 出牌吧</div>
                    <div class="emoji-item" onclick="sendEmoji('🐔')">🐔 菜鸡</div>
                    <div class="emoji-item" onclick="sendEmoji('🍵')">🍵 喝口茶</div>
                    <div class="emoji-item" onclick="sendEmoji('🚀')">🚀 起飞</div>
                    <div class="emoji-item" onclick="sendEmoji('💔')">💔 心碎</div>
                    <div class="emoji-item" onclick="sendEmoji('🎉')">🎉 赢了</div>
                </div>
            </div>
        </div>

        <div class="side-panel task-panel" id="taskPanel">
            <div class="panel-header">
                <span>📋 每日任务</span>
                <button class="close-btn" onclick="toggleTasks()">×</button>
            </div>
            <div class="panel-content">
                <div class="daily-checkin">
                    <button class="checkin-btn" id="checkinBtn" onclick="dailyCheckin()">
                        📅 每日签到
                    </button>
                    <div class="checkin-days" id="checkinDays">已连续签到 0 天</div>
                </div>
                <div class="task-list" id="taskList"></div>
            </div>
        </div>

        <div class="side-panel ranking-panel" id="rankingPanel">
            <div class="panel-header">
                <span>🏆 排行榜</span>
                <button class="close-btn" onclick="toggleRanking()">×</button>
            </div>
            <div class="panel-content">
                <div class="ranking-tabs">
                    <button class="ranking-tab active" data-tab="local" onclick="switchRankingTab('local')">本地</button>
                    <button class="ranking-tab" data-tab="season" onclick="switchRankingTab('season')">赛季</button>
                </div>
                <div class="ranking-list" id="rankingList"></div>
            </div>
        </div>

        <div class="modal" id="gameOverModal">
            <div class="modal-content">
                <h2 id="gameOverTitle">游戏结束</h2>
                <p id="gameOverMessage"></p>
                <div class="game-rewards" id="gameRewards"></div>
                <div class="modal-buttons">
                    <button class="btn btn-primary" onclick="startGame()">再来一局</button>
                    <button class="btn btn-secondary" onclick="backToLobby()">返回大厅</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/game.js"></script>
    <script src="js/ai.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/features.js"></script>
</body>
</html>
