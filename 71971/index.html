<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电路连接逻辑</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="level-select-screen" class="screen active">
        <div class="title-area">
            <h1 class="game-title">CIRCUIT LOGIC</h1>
            <p class="game-subtitle">电路连接逻辑</p>
            <div class="title-decoration"></div>
        </div>
        <div id="level-grid" class="level-grid"></div>
        <div class="footer-hint">选择关卡开始游戏</div>
    </div>

    <div id="game-screen" class="screen">
        <header class="game-header">
            <button id="btn-back" class="btn-icon" title="返回关卡选择">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </button>
            <div class="level-info">
                <h2 id="level-name">--</h2>
                <p id="level-desc">--</p>
            </div>
            <div class="star-display" id="star-display"></div>
        </header>

        <div class="game-body">
            <aside class="component-sidebar" id="component-sidebar">
                <h3 class="sidebar-title">元件库</h3>
                <div id="component-list" class="component-list"></div>
            </aside>

            <div class="canvas-container">
                <canvas id="game-canvas"></canvas>
                <div id="canvas-hint" class="canvas-hint hidden">点击元件库选择元件，再点击网格放置</div>
            </div>
        </div>

        <footer class="game-footer">
            <button id="btn-rotate" class="btn-action" title="旋转选中的元件 (R)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
                <span>旋转</span>
            </button>
            <button id="btn-delete" class="btn-action btn-danger" title="删除选中的元件 (Delete)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                <span>删除</span>
            </button>
            <button id="btn-reset" class="btn-action" title="重置当前关卡">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2.5 2v6h6M2.5 8A10 10 0 1 1 4.93 17"/></svg>
                <span>重置</span>
            </button>
            <button id="btn-hint" class="btn-action btn-hint" title="获取提示">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18h6M10 22h4M12 2a7 7 0 0 0-4 12.7V17h8v-2.3A7 7 0 0 0 12 2z"/></svg>
                <span>提示</span>
            </button>
        </footer>
    </div>

    <div id="level-complete-overlay" class="overlay hidden">
        <div class="overlay-backdrop"></div>
        <div class="overlay-content">
            <div class="complete-icon">&#9889;</div>
            <h2>通关成功</h2>
            <div id="complete-stars" class="complete-stars"></div>
            <p id="complete-message"></p>
            <div class="overlay-buttons">
                <button id="btn-next-level" class="btn-primary">下一关</button>
                <button id="btn-replay" class="btn-secondary">重玩</button>
                <button id="btn-levels" class="btn-secondary">关卡选择</button>
            </div>
        </div>
    </div>

    <div id="fault-alert" class="fault-alert hidden">
        <div class="fault-icon">&#9888;</div>
        <span id="fault-message"></span>
    </div>

    <script src="js/levels.js"></script>
    <script src="js/grid.js"></script>
    <script src="js/circuit.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/drag.js"></script>
    <script src="js/level.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
