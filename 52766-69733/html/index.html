<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>弹球消除砖块 - 终极版</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <div class="stat-item">
                <span class="stat-label">得分</span>
                <span id="score" class="stat-value">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">生命</span>
                <span id="lives" class="stat-value">3</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">关卡</span>
                <span id="level" class="stat-value">1</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">连击</span>
                <span id="combo" class="stat-value">0</span>
            </div>
        </div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div class="game-controls">
            <button id="startBtn" class="btn btn-primary">开始游戏</button>
            <button id="pauseBtn" class="btn btn-secondary">暂停</button>
            <button id="restartBtn" class="btn btn-danger">重新开始</button>
        </div>
        <div class="game-controls secondary-controls">
            <button id="editorBtn" class="btn btn-secondary">🎨 关卡编辑器</button>
            <button id="leaderboardBtn" class="btn btn-secondary">🏆 排行榜</button>
            <button id="achievementsBtn" class="btn btn-secondary">🏅 成就</button>
        </div>
        <div class="game-tips">
            <p>🎮 使用 <strong>← →</strong> 方向键或 <strong>鼠标</strong> 移动挡板</p>
            <p>🚀 按 <strong>空格键</strong> 发射小球 | 按 <strong>L键</strong> 发射激光</p>
            <p>💡 提示：接球时按方向键可加速反弹！磁性道具可让球更稳！</p>
        </div>
    </div>

    <div id="gameOverlay" class="game-overlay hidden">
        <div class="overlay-content">
            <h2 id="overlayTitle">游戏结束</h2>
            <p id="overlayMessage">再接再厉！</p>
            <button id="overlayBtn" class="btn btn-primary">再来一局</button>
        </div>
    </div>

    <div id="customOverlay" class="game-overlay hidden">
        <div class="overlay-content large">
            <div class="overlay-header">
                <h2 id="customOverlayTitle">标题</h2>
                <button id="closeOverlay" class="close-btn">×</button>
            </div>
            <div id="customOverlayContent" class="overlay-body">
            </div>
        </div>
    </div>

    <script src="../js/game.js"></script>
</body>
</html>
