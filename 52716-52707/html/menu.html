<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>麻将连连看 - 主菜单</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/menu.css">
</head>
<body>
    <div class="menu-container">
        <div class="menu-bg"></div>
        
        <div class="menu-content">
            <h1 class="game-title">
                <span class="title-icon">🀄</span>
                <span class="title-text">麻将连连看</span>
            </h1>
            
            <p class="game-subtitle">经典休闲益智游戏</p>

            <div class="menu-buttons">
                <button id="btn-start" class="menu-btn btn-primary">
                    <span class="btn-icon">🎮</span>
                    <span>开始游戏</span>
                </button>
                <button id="btn-levels" class="menu-btn btn-secondary">
                    <span class="btn-icon">📋</span>
                    <span>关卡选择</span>
                </button>
                <button id="btn-themes" class="menu-btn btn-secondary">
                    <span class="btn-icon">🎨</span>
                    <span>主题切换</span>
                </button>
                <button id="btn-help" class="menu-btn btn-secondary">
                    <span class="btn-icon">❓</span>
                    <span>游戏帮助</span>
                </button>
            </div>

            <div class="player-stats">
                <div class="stat-card">
                    <span class="stat-icon">⭐</span>
                    <span class="stat-value" id="total-stars">0</span>
                    <span class="stat-label">总星星</span>
                </div>
                <div class="stat-card">
                    <span class="stat-icon">🏆</span>
                    <span class="stat-value" id="levels-unlocked">1</span>
                    <span class="stat-label">已解锁</span>
                </div>
                <div class="stat-card">
                    <span class="stat-icon">🎯</span>
                    <span class="stat-value" id="high-score">0</span>
                    <span class="stat-label">最高分</span>
                </div>
            </div>
        </div>

        <div id="levels-panel" class="panel hidden">
            <div class="panel-content">
                <div class="panel-header">
                    <h2>关卡选择</h2>
                    <button class="close-btn" data-close="levels-panel">✕</button>
                </div>
                <div class="levels-grid" id="levels-grid"></div>
            </div>
        </div>

        <div id="themes-panel" class="panel hidden">
            <div class="panel-content">
                <div class="panel-header">
                    <h2>选择主题</h2>
                    <button class="close-btn" data-close="themes-panel">✕</button>
                </div>
                <div class="themes-grid" id="themes-grid"></div>
            </div>
        </div>

        <div id="help-panel" class="panel hidden">
            <div class="panel-content">
                <div class="panel-header">
                    <h2>游戏帮助</h2>
                    <button class="close-btn" data-close="help-panel">✕</button>
                </div>
                <div class="help-content">
                    <h3>🎯 游戏规则</h3>
                    <p>点击两张相同的牌进行消除，两张牌之间的连接路径最多只能拐弯两次。</p>
                    
                    <h3>⭐ 星级评价</h3>
                    <ul>
                        <li>在最短时间内完成获得三星</li>
                        <li>使用更少的步数获得更高评价</li>
                        <li>达成目标分数获得额外奖励</li>
                    </ul>

                    <h3>🎁 道具说明</h3>
                    <ul>
                        <li><strong>💡 提示</strong>：高亮显示可配对的牌</li>
                        <li><strong>🔀 洗牌</strong>：重新排列剩余的牌</li>
                        <li><strong>💣 炸弹</strong>：随机消除一对牌</li>
                        <li><strong>⏪ 回溯</strong>：撤销上一步操作</li>
                    </ul>

                    <h3>⏱️ 挑战模式</h3>
                    <ul>
                        <li><strong>计时模式</strong>：在限定时间内完成关卡</li>
                        <li><strong>步数模式</strong>：在限定步数内完成关卡</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/themes.js"></script>
    <script src="../js/levels.js"></script>
    <script src="../js/storage.js"></script>
    <script src="../js/menu.js"></script>
</body>
</html>
