<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冰球对碰 - 豪华版</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="game-container">
        <div class="header">
            <div class="score-board">
                <div class="player-score player1">
                    <span class="player-label" id="player1Label">玩家1 (W/S)</span>
                    <span class="score" id="score1">0</span>
                </div>
                <div class="game-info">
                    <div class="game-time">
                        <span class="time-label">比赛时间</span>
                        <span class="time" id="gameTime">00:00</span>
                    </div>
                    <div class="bounce-info">
                        <span class="bounce-label">反弹次数</span>
                        <span class="bounce-count" id="bounceCount">0</span>
                    </div>
                </div>
                <div class="player-score player2">
                    <span class="score" id="score2">0</span>
                    <span class="player-label" id="player2Label">玩家2 (↑/↓)</span>
                </div>
            </div>
        </div>

        <div class="game-wrapper">
            <canvas id="gameCanvas"></canvas>
            
            <div class="power-bar">
                <div class="power-slot" data-power="grow" title="球拍加长 (Q/O)">
                    <span class="power-icon">📏</span>
                    <span class="power-count" id="powerGrow1">0</span>
                </div>
                <div class="power-slot" data-power="speed" title="球速加倍 (E/P)">
                    <span class="power-icon">⚡</span>
                    <span class="power-count" id="powerSpeed1">0</span>
                </div>
                <div class="power-slot" data-power="freeze" title="冰冻对方 (R/I)">
                    <span class="power-icon">❄️</span>
                    <span class="power-count" id="powerFreeze1">0</span>
                </div>
                <div class="power-divider"></div>
                <div class="power-slot" data-power="grow" title="球拍加长">
                    <span class="power-icon">📏</span>
                    <span class="power-count" id="powerGrow2">0</span>
                </div>
                <div class="power-slot" data-power="speed" title="球速加倍">
                    <span class="power-icon">⚡</span>
                    <span class="power-count" id="powerSpeed2">0</span>
                </div>
                <div class="power-slot" data-power="freeze" title="冰冻对方">
                    <span class="power-icon">❄️</span>
                    <span class="power-count" id="powerFreeze2">0</span>
                </div>
            </div>

            <div class="overlay" id="startOverlay">
                <div class="overlay-content">
                    <h1 class="game-title">冰球对碰</h1>
                    <p class="game-subtitle">豪华版 - 多种模式等你挑战</p>
                    
                    <div class="settings-panel">
                        <div class="setting-group">
                            <label class="setting-label">游戏模式</label>
                            <div class="setting-options">
                                <button class="setting-btn active" data-mode="pvp">双人对战</button>
                                <button class="setting-btn" data-mode="ai">AI对战</button>
                                <button class="setting-btn" data-mode="tournament">锦标赛</button>
                                <button class="setting-btn" data-mode="spectator">观战模式</button>
                            </div>
                        </div>

                        <div class="setting-group" id="aiDifficultyGroup" style="display: none;">
                            <label class="setting-label">AI难度</label>
                            <div class="setting-options">
                                <button class="setting-btn active" data-difficulty="easy">简单</button>
                                <button class="setting-btn" data-difficulty="medium">中等</button>
                                <button class="setting-btn" data-difficulty="hard">困难</button>
                            </div>
                        </div>

                        <div class="setting-group">
                            <label class="setting-label">场地主题</label>
                            <div class="setting-options">
                                <button class="setting-btn active" data-theme="ice">冰球场</button>
                                <button class="setting-btn" data-theme="pingpong">乒乓球桌</button>
                                <button class="setting-btn" data-theme="beach">沙滩球场</button>
                            </div>
                        </div>

                        <div class="setting-group">
                            <label class="setting-label">物理材质</label>
                            <div class="setting-options">
                                <button class="setting-btn active" data-material="ice">冰面</button>
                                <button class="setting-btn" data-material="wood">木板</button>
                                <button class="setting-btn" data-material="sand">沙地</button>
                            </div>
                        </div>

                        <div class="setting-group">
                            <label class="setting-label">获胜分数</label>
                            <div class="setting-options">
                                <button class="setting-btn" data-score="5">5分</button>
                                <button class="setting-btn active" data-score="7">7分</button>
                                <button class="setting-btn" data-score="11">11分</button>
                            </div>
                        </div>
                    </div>

                    <div class="instructions">
                        <div class="instruction-item">
                            <span class="key">W</span><span class="key">S</span>
                            <span class="instruction-text">玩家1 上下移动</span>
                        </div>
                        <div class="instruction-item">
                            <span class="key">↑</span><span class="key">↓</span>
                            <span class="instruction-text">玩家2 上下移动</span>
                        </div>
                        <div class="instruction-item">
                            <span class="key">Q</span><span class="key">E</span><span class="key">R</span>
                            <span class="instruction-text">玩家1 使用道具</span>
                        </div>
                        <div class="instruction-item">
                            <span class="key">O</span><span class="key">P</span><span class="key">I</span>
                            <span class="instruction-text">玩家2 使用道具</span>
                        </div>
                        <div class="instruction-item">
                            <span class="key space">空格</span>
                            <span class="instruction-text">暂停/继续</span>
                        </div>
                    </div>

                    <button class="btn btn-primary" id="startBtn">开始游戏</button>
                    
                    <div class="season-stats" id="seasonStats" style="display: none;">
                        <p>赛季积分: <span id="seasonPoints">0</span></p>
                        <p>胜率: <span id="winRate">0%</span></p>
                    </div>
                </div>
            </div>

            <div class="overlay hidden" id="pauseOverlay">
                <div class="overlay-content">
                    <h2 class="pause-title">游戏暂停</h2>
                    <button class="btn btn-primary" id="resumeBtn">继续游戏</button>
                    <button class="btn btn-secondary" id="resetBtn1">重新开始</button>
                </div>
            </div>

            <div class="overlay hidden" id="winOverlay">
                <div class="overlay-content">
                    <h2 class="win-title" id="winTitle">玩家1 获胜！</h2>
                    <p class="final-score">最终比分 <span id="finalScore1">0</span> : <span id="finalScore2">0</span></p>
                    <p class="game-stats">比赛时间: <span id="finalTime">00:00</span></p>
                    <p class="game-stats" id="tournamentInfo" style="display: none;"></p>
                    <button class="btn btn-primary" id="playAgainBtn">再来一局</button>
                    <button class="btn btn-secondary" id="backToMenuBtn">返回主菜单</button>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-control" id="pauseBtn">暂停</button>
            <button class="btn btn-control" id="resetBtn">重置</button>
            <div class="speed-indicator">
                <span class="speed-label">球速</span>
                <div class="speed-bar">
                    <div class="speed-fill" id="speedFill"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/game.js"></script>
</body>
</html>
