<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>太阳系模拟器 | Solar System Simulator</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪐</text></svg>">
</head>
<body>
  <canvas id="solar-canvas"></canvas>

  <div class="app-title">
    <h1>SOLAR SYSTEM</h1>
    <div class="subtitle">趣味太阳系模拟器</div>
  </div>

  <div class="planet-quick-list" id="planet-quick-list"></div>

  <div class="planet-info-panel" id="planet-info-panel">
    <div class="panel-header">
      <span class="panel-title">行星档案</span>
      <button class="panel-close-btn" id="panel-close">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="panel-body" id="planet-details"></div>
  </div>

  <div class="hint-bar">滚轮缩放 · 拖拽平移 · 点击行星查看详情 · 双击行星聚焦</div>

  <div class="time-controls">
    <button class="ctrl-btn" id="btn-slower" title="减速">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path d="M6 6h4v12H6zm-5 0h4v12H1zm10 0l9 6-9 6z"/>
      </svg>
    </button>
    <button class="ctrl-btn" id="btn-pause" title="暂停/播放">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/>
      </svg>
    </button>
    <button class="ctrl-btn" id="btn-faster" title="加速">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path d="M3 6l9 6-9 6zm8 0l9 6-9 6zm2-4h4v20h-4z" transform="translate(2,0)"/>
      </svg>
    </button>
    <div class="ctrl-divider"></div>
    <span class="speed-display" id="speed-display">×1</span>
    <div class="ctrl-divider"></div>
    <span class="elapsed-info" id="elapsed-time">0 天 (0.00 地球年)</span>
    <div class="ctrl-divider"></div>
    <button class="ctrl-btn" id="btn-reset-view" title="重置视角">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="3"/><path d="M12 2v4m0 12v4m-7.07-2.93l2.83-2.83m8.48-8.48l2.83-2.83M2 12h4m12 0h4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83"/>
      </svg>
    </button>
    <button class="ctrl-btn" id="btn-reset" title="重置模拟">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
      </svg>
    </button>
  </div>

  <script src="../js/planets.js"></script>
  <script src="../js/renderer.js"></script>
  <script src="../js/time-controller.js"></script>
  <script src="../js/interaction.js"></script>
  <script src="../js/solar-system.js"></script>
  <script src="../js/main.js"></script>
</body>
</html>
