<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打地鼠反应挑战</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1 class="game-title">🔨 打地鼠反应挑战 🐹</h1>
        
        <div class="info-bar">
            <div class="info-item">
                <span class="info-label">⏱️ 时间</span>
                <span id="timer" class="info-value">30</span>
            </div>
            <div class="info-item">
                <span class="info-label">🎯 得分</span>
                <span id="score" class="info-value">0</span>
            </div>
            <div class="info-item">
                <span class="info-label">👊 击中</span>
                <span id="hit-count" class="info-value">0</span>
            </div>
        </div>

        <div class="game-board">
            <div class="hole" data-index="0">
                <div class="mole"></div>
                <div class="dirt"></div>
            </div>
            <div class="hole" data-index="1">
                <div class="mole"></div>
                <div class="dirt"></div>
            </div>
            <div class="hole" data-index="2">
                <div class="mole"></div>
                <div class="dirt"></div>
            </div>
            <div class="hole" data-index="3">
                <div class="mole"></div>
                <div class="dirt"></div>
            </div>
            <div class="hole" data-index="4">
                <div class="mole"></div>
                <div class="dirt"></div>
            </div>
            <div class="hole" data-index="5">
                <div class="mole"></div>
                <div class="dirt"></div>
            </div>
            <div class="hole" data-index="6">
                <div class="mole"></div>
                <div class="dirt"></div>
            </div>
            <div class="hole" data-index="7">
                <div class="mole"></div>
                <div class="dirt"></div>
            </div>
            <div class="hole" data-index="8">
                <div class="mole"></div>
                <div class="dirt"></div>
            </div>
        </div>

        <button id="start-btn" class="start-btn">🎮 开始游戏</button>
    </div>

    <div id="result-modal" class="modal hidden">
        <div class="modal-content">
            <h2 class="modal-title">🎉 游戏结束！</h2>
            <div class="result-stats">
                <div class="stat-item">
                    <span class="stat-label">最终得分</span>
                    <span id="final-score" class="stat-value">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">击中次数</span>
                    <span id="final-hits" class="stat-value">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">命中率</span>
                    <span id="accuracy" class="stat-value">0%</span>
                </div>
            </div>
            <button id="restart-btn" class="restart-btn">🔄 再来一局</button>
        </div>
    </div>

    <div id="score-popup" class="score-popup hidden">+10</div>

    <script src="script.js"></script>
</body>
</html>
