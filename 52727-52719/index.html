<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>愤怒小鸟弹射游戏 - 豪华版</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <div class="score-panel">
                <span>分数: <span id="score">0</span></span>
                <span>关卡: <span id="level">1-1</span></span>
                <span>章节: <span id="chapter">1</span></span>
                <div class="stars">
                    <span class="star" id="star1">★</span>
                    <span class="star" id="star2">★</span>
                    <span class="star" id="star3">★</span>
                </div>
            </div>
            <div class="controls">
                <button id="chapterSelectBtn">章节选择</button>
                <button id="editorBtn">关卡编辑器</button>
                <button id="restartBtn">重新开始</button>
                <button id="nextLevelBtn" style="display:none;">下一关</button>
            </div>
        </div>
        
        <div class="bird-selector" id="birdSelector">
            <div class="bird-option active" data-type="red" title="红色普通鸟 - 无特殊技能">
                <div class="bird-icon red"></div>
                <span class="bird-count">3</span>
            </div>
            <div class="bird-option" data-type="blue" title="蓝色分身鸟 - 点击分裂成3只">
                <div class="bird-icon blue"></div>
                <span class="bird-count">2</span>
            </div>
            <div class="bird-option" data-type="yellow" title="黄色加速鸟 - 点击加速冲刺">
                <div class="bird-icon yellow"></div>
                <span class="bird-count">2</span>
            </div>
            <div class="bird-option" data-type="black" title="黑色炸弹鸟 - 点击爆炸">
                <div class="bird-icon black"></div>
                <span class="bird-count">1</span>
            </div>
            <div class="bird-option" data-type="green" title="绿色回旋鸟 - 点击回旋镖">
                <div class="bird-icon green"></div>
                <span class="bird-count">2</span>
            </div>
            <div class="bird-option" data-type="white" title="白色下蛋鸟 - 点击投掷炸弹蛋">
                <div class="bird-icon white"></div>
                <span class="bird-count">1</span>
            </div>
        </div>
        
        <canvas id="gameCanvas" width="1200" height="600"></canvas>
        
        <div class="skill-hint" id="skillHint">飞行中点击屏幕释放技能!</div>
        
        <div id="gameMessage" class="game-message" style="display:none;">
            <div class="stars-display" id="starsDisplay"></div>
            <h2 id="messageTitle"></h2>
            <p id="messageText"></p>
            <div class="message-buttons">
                <button id="retryBtn">重试</button>
                <button id="continueBtn" style="display:none;">继续</button>
            </div>
        </div>
        
        <div id="chapterModal" class="modal" style="display:none;">
            <div class="modal-content">
                <h2>选择章节</h2>
                <div class="chapter-grid" id="chapterGrid"></div>
                <button class="close-btn" onclick="document.getElementById('chapterModal').style.display='none'">关闭</button>
            </div>
        </div>
        
        <div id="editorModal" class="modal" style="display:none;">
            <div class="modal-content editor-modal">
                <h2>关卡编辑器</h2>
                <div class="editor-toolbar">
                    <button class="tool-btn" data-tool="block_wood">木头</button>
                    <button class="tool-btn" data-tool="block_ice">冰块</button>
                    <button class="tool-btn" data-tool="block_stone">石块</button>
                    <button class="tool-btn" data-tool="tnt">TNT</button>
                    <button class="tool-btn" data-tool="balloon">气球</button>
                    <button class="tool-btn" data-tool="pig">小猪</button>
                    <button class="tool-btn" data-tool="boss_pig">BOSS猪</button>
                    <button class="tool-btn" data-tool="bird_red">红鸟</button>
                    <button class="tool-btn" data-tool="eraser">橡皮擦</button>
                </div>
                <canvas id="editorCanvas" width="1000" height="500"></canvas>
                <div class="editor-controls">
                    <button id="saveLevelBtn">保存关卡</button>
                    <button id="loadLevelBtn">加载关卡</button>
                    <button id="clearEditorBtn">清空</button>
                    <button id="testLevelBtn">测试关卡</button>
                    <button id="shareLevelBtn">分享关卡</button>
                    <button class="close-btn" onclick="document.getElementById('editorModal').style.display='none'">关闭</button>
                </div>
                <div id="levelCode" class="level-code" style="display:none;"></div>
            </div>
        </div>
    </div>
    
    <script src="js/game.js"></script>
</body>
</html>
