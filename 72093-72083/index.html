<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数独益智游戏</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="title">数独益智</h1>
            <div class="game-info">
                <div class="timer">
                    <span class="timer-icon">⏱️</span>
                    <span id="timer">00:00</span>
                </div>
                <div class="difficulty-display">
                    <span id="difficultyLabel">中等</span>
                </div>
                <div class="game-controls">
                    <button id="newGameBtn" class="btn btn-primary">新游戏</button>
                    <button id="resetBtn" class="btn btn-secondary">重置</button>
                </div>
            </div>
        </header>

        <div class="difficulty-selector">
            <span class="selector-label">难度：</span>
            <button class="diff-btn active" data-difficulty="easy">简单</button>
            <button class="diff-btn" data-difficulty="medium">中等</button>
            <button class="diff-btn" data-difficulty="hard">困难</button>
            <button class="diff-btn" data-difficulty="expert">专家</button>
        </div>

        <div class="toolbar">
            <button id="noteModeBtn" class="tool-btn" title="候选数模式">✏️ 笔记</button>
            <button id="autoCandidatesBtn" class="tool-btn" title="自动填入候选数">🔍 自动候选</button>
            <button id="clearCandidatesBtn" class="tool-btn" title="清除候选数">🧹 清除笔记</button>
            <button id="checkErrorsBtn" class="tool-btn" title="检查错误">⚠️ 检查错误</button>
            <button id="hintBtn" class="tool-btn" title="提示一个格子">💡 提示</button>
            <button id="solveBtn" class="tool-btn" title="可视化求解">▶️ 求解演示</button>
        </div>

        <main class="game-container">
            <div class="sudoku-board" id="sudokuBoard">
            </div>

            <div class="number-pad">
                <button class="num-btn" data-num="1">1</button>
                <button class="num-btn" data-num="2">2</button>
                <button class="num-btn" data-num="3">3</button>
                <button class="num-btn" data-num="4">4</button>
                <button class="num-btn" data-num="5">5</button>
                <button class="num-btn" data-num="6">6</button>
                <button class="num-btn" data-num="7">7</button>
                <button class="num-btn" data-num="8">8</button>
                <button class="num-btn" data-num="9">9</button>
                <button class="num-btn clear-btn" data-num="0">✕ 清除</button>
            </div>
        </main>

        <div class="achievements-bar">
            <div class="achievement" id="achFirstWin" title="首次通关">🏆</div>
            <div class="achievement" id="achSpeedWin" title="快速通关（<5分钟）">⚡</div>
            <div class="achievement" id="achExpertWin" title="通关专家难度">🎯</div>
            <div class="streak-display">
                <span>🔥 连续</span>
                <span id="streakDays">0</span>
                <span>天</span>
            </div>
        </div>
    </div>

    <div class="modal" id="winModal">
        <div class="modal-content">
            <div class="modal-icon">🎉</div>
            <h2 class="modal-title">恭喜通关！</h2>
            <p class="modal-text">你成功完成了数独</p>
            <p class="modal-time">用时：<span id="finalTime">00:00</span></p>
            <div class="modal-achievements" id="modalAchievements"></div>
            <button id="playAgainBtn" class="btn btn-primary">再来一局</button>
        </div>
    </div>

    <div class="modal" id="solveModal">
        <div class="modal-content solve-modal">
            <h2 class="modal-title">求解演示</h2>
            <p class="modal-text" id="solveStatus">正在求解...</p>
            <div class="solve-controls">
                <button id="pauseSolveBtn" class="btn btn-secondary">暂停</button>
                <button id="stopSolveBtn" class="btn btn-secondary">停止</button>
            </div>
            <div class="solve-speed">
                <label>速度：</label>
                <input type="range" id="solveSpeed" min="10" max="500" value="100">
            </div>
        </div>
    </div>

    <div class="achievement-toast" id="achievementToast">
        <div class="toast-icon">🏆</div>
        <div class="toast-content">
            <div class="toast-title">成就解锁</div>
            <div class="toast-text" id="toastText"></div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
