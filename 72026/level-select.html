<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>击球砖块弹射 - 关卡选择</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/style.css" />
  <style>
    body {
      overflow-y: auto;
    }
    #level-select {
      min-height: 100vh;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #level-select h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 36px;
      color: #00d4ff;
      text-shadow: 0 0 30px rgba(0,212,255,0.4);
      margin-bottom: 8px;
      letter-spacing: 3px;
    }
    #level-select .subtitle {
      font-family: 'Rajdhani', sans-serif;
      font-size: 16px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 40px;
    }
    .level-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 20px;
      max-width: 900px;
      width: 100%;
      padding: 0 20px;
    }
    .level-card {
      background: linear-gradient(135deg, rgba(0,212,255,0.1), rgba(139,92,246,0.1));
      border: 2px solid rgba(0,212,255,0.3);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    .level-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      transition: left 0.5s ease;
    }
    .level-card:hover::before {
      left: 100%;
    }
    .level-card:hover:not(.locked) {
      transform: translateY(-4px) scale(1.02);
      border-color: #00d4ff;
      box-shadow: 0 0 30px rgba(0,212,255,0.3);
    }
    .level-card.locked {
      opacity: 0.4;
      cursor: not-allowed;
      border-color: rgba(255,255,255,0.1);
    }
    .level-card .level-num {
      font-family: 'Orbitron', sans-serif;
      font-size: 32px;
      font-weight: 900;
      color: #00d4ff;
      text-shadow: 0 0 15px rgba(0,212,255,0.5);
      margin-bottom: 8px;
    }
    .level-card.locked .level-num {
      color: #666;
      text-shadow: none;
    }
    .level-card .level-name {
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px;
      color: rgba(255,255,255,0.7);
      margin-bottom: 12px;
    }
    .level-card .stars {
      font-size: 16px;
      letter-spacing: 2px;
      margin-bottom: 8px;
      min-height: 20px;
    }
    .level-card .stars .empty {
      opacity: 0.2;
    }
    .level-card .high-score {
      font-family: 'Orbitron', sans-serif;
      font-size: 12px;
      color: #fbbf24;
    }
    .level-card .lock-icon {
      font-size: 24px;
      margin-bottom: 8px;
    }
    .level-card.boss {
      background: linear-gradient(135deg, rgba(147,51,234,0.2), rgba(236,72,153,0.1));
      border-color: rgba(147,51,234,0.5);
    }
    .level-card.boss .level-num {
      color: #9333ea;
      text-shadow: 0 0 15px rgba(147,51,234,0.5);
    }
    .level-card.boss:hover:not(.locked) {
      border-color: #9333ea;
      box-shadow: 0 0 30px rgba(147,51,234,0.4);
    }
    .nav-buttons {
      display: flex;
      gap: 16px;
      margin-top: 40px;
    }
    .nav-btn {
      font-family: 'Orbitron', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: #0a0e27;
      background: linear-gradient(135deg, #00d4ff, #00ff88);
      border: none;
      padding: 12px 28px;
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 2px;
      text-transform: uppercase;
      box-shadow: 0 0 20px rgba(0,212,255,0.3);
      transition: all 0.3s ease;
    }
    .nav-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 30px rgba(0,212,255,0.5);
    }
    .nav-btn.secondary {
      background: linear-gradient(135deg, #8b5cf6, #ec4899);
      box-shadow: 0 0 20px rgba(139,92,246,0.3);
    }
    .nav-btn.secondary:hover {
      box-shadow: 0 0 30px rgba(139,92,246,0.5);
    }
  </style>
</head>
<body>
  <div id="level-select">
    <h1>关卡选择</h1>
    <p class="subtitle">选择关卡开始游戏，或进入编辑器创建你的关卡</p>
    <div class="level-grid" id="levelGrid"></div>
    <div class="nav-buttons">
      <button class="nav-btn" onclick="location.href='./'">返回游戏</button>
      <button class="nav-btn secondary" onclick="location.href='./editor.html'">关卡编辑器</button>
    </div>
  </div>
  <script type="module" src="./js/level-select.ts"></script>
</body>
</html>
