<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>击球砖块弹射</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div id="hud">
      <div id="hud-left">
        <span class="hud-label">分数</span>
        <span id="score" class="hud-value">0</span>
      </div>
      <div id="hud-center">
        <span class="hud-label">关卡</span>
        <span id="level" class="hud-value">1</span>
      </div>
      <div id="hud-right">
        <span class="hud-label">生命</span>
        <span id="lives" class="hud-value">❤❤❤</span>
      </div>
    </div>
    <div id="overlay" class="visible">
      <div id="overlay-content">
        <h1 id="overlay-title">击球砖块弹射</h1>
        <p id="overlay-subtitle">使用 ← → 或 A D 键移动平台，鼠标同样可以操控</p>
        <button id="start-btn">开始游戏</button>
      </div>
    </div>
  </div>
  <script type="module" src="./js/main.ts"></script>
</body>
</html>
